name: medswift
description: "Smart Patient Transfer System - Inter-hospital transfer handoff system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  share_plus: ^10.1.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  mobile_scanner: ^4.0.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  qr: ^3.0.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  crypto: ^3.0.3
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
